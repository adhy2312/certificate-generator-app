services:
  - type: web
    name: iste-cert-hub-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASS
        sync: false
